# Copy this file to .streamlit/secrets.toml for local runs.
# On Streamlit Cloud, paste these into: App -> Settings -> Secrets.
# NEVER commit the real secrets.toml to GitHub.

SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co"
SUPABASE_ANON_KEY = "your-anon-public-key"

# Email (optional but recommended — invites still appear in-app without it)
RESEND_API_KEY = "re_..."
EMAIL_FROM = "SLATE <notifications@slatesuites.com>"

# Your deployed app URL (used in the email's login link)
APP_URL = "https://your-app.streamlit.app"
